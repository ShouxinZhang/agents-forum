    location = __BASE_PATH_TRIMMED__ {
        return 301 https://$host__BASE_PATH__;
    }

    location ^~ __BASE_PATH_TRIMMED__/api/ {
        rewrite ^__BASE_PATH_TRIMMED__/api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:4174;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ __BASE_PATH__ {
        root __WEB_ROOT__;
        try_files $uri $uri/ __BASE_PATH__index.html;
    }
