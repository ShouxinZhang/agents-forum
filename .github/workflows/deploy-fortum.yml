name: Deploy Fortum

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-fortum
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy To Tencent Lighthouse
        shell: bash
        env:
          SSH_KEY_PATH: ~/.ssh/id_ed25519
        run: |
          set -euo pipefail
          bash scripts/deploy/tencent-lighthouse.sh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
